<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      background: url('airline.png') no-repeat center center;
      background-size: contain; /* ensure entire image is visible */
      background-color: #000; /* fallback color for empty areas */
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    /* Home Button */
    .home-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      padding: 10px 20px;
      background-color: rgba(0, 51, 102, 0.8); /* semi-transparent dark blue */
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-size: 1rem;
      transition: background-color 0.3s, transform 0.2s;
    }

    .home-btn:hover {
      background-color: rgba(0, 51, 102, 1);
      transform: scale(1.05);
    }

    @media (max-width: 480px) {
      .home-btn {
        font-size: 0.9rem;
        padding: 8px 16px;
      }
    }
  </style>
</head>
<body>
  <!-- Home button -->
  <a class="home-btn" href="index.html">Home</a>
</body>
</html>
